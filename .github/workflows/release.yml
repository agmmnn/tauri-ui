name: Release

on:
  push:
    branches:
      - master
    paths:
      - ".changeset/**"
      - ".github/workflows/release.yml"
      - "package.json"
      - "bun.lock"
      - "scripts/**"
      - "packages/create-tauri-ui/**"

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check package types
        run: bun run --cwd packages/create-tauri-ui check-types

      - name: Build package
        run: bun run --cwd packages/create-tauri-ui build

      - name: Smoke test representative templates
        run: bun run test:create-tauri-ui:release

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version-packages
          title: "chore: release"
          commit: "chore: release"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./packages/create-tauri-ui/package.json').version")
          TAG="create-tauri-ui@$VERSION"

          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "No release tag created in this run. Skipping GitHub release creation."
            exit 0
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release already exists for $TAG"
            exit 0
          fi

          gh release create "$TAG" --title "$TAG" --generate-notes
